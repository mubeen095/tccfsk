        img.style.cssText = 'height:1.4em;width:auto;display:inline-block;vertical-align:middle;object-fit:contain;';
        parent.replaceChild(img, node);
      }
      var observer = new MutationObserver(function() {
        var walker = document.createTreeWalker(document.body, 4, null, false);
        var nodes = [];
        while (walker.nextNode()) nodes.push(walker.currentNode);
        nodes.forEach(function(node) {
          if (node.nodeType === 3 && node.textContent.trim() === 'thecodingcompany')
            replaceLogo(node);
        });
      });
      observer.observe(document.documentElement, { childList: true, subtree: true });
    })();
    </script>
    <script>
    (function() {
      function initHls(video) {
        if (video.__hlsInitialized) return;
        var src = video.src || video.getAttribute('src');
        if (!src || (typeof src !== 'string') || !src.includes('.m3u8')) return;
        var canPlayNative = video.canPlayType('application/vnd.apple.mpegurl');
        if (canPlayNative === 'probably' || canPlayNative === 'maybe') {
          video.__hlsInitialized = true;
          video.play()['catch'](function(){});
          return;
        }
        if (window.Hls && Hls.isSupported()) {
          video.removeAttribute('src');
          video.src = '';
          var hls = new Hls();
          hls.loadSource(src);
          hls.attachMedia(video);
          video.__hlsInitialized = true;
          hls.on(Hls.Events.MANIFEST_PARSED, function() {
            video.play()['catch'](function(){});
          });
        }
      }
      function scanVideos() {
        document.querySelectorAll('video').forEach(initHls);
      }
      var observer = new MutationObserver(scanVideos);
      observer.observe(document.documentElement, { childList: true, subtree: true, attributes: true });
      if (document.readyState === 'loading')
        document.addEventListener('DOMContentLoaded', scanVideos);
      else
        scanVideos();
    })();
    </script>
  </body>
